services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: board
      POSTGRES_USER: board
      POSTGRES_PASSWORD: board
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U board -d board"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/board
      DATABASE_USERNAME: board
      DATABASE_PASSWORD: board
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
